<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghotra's Hospital — HMS</title>
  <meta name="description" content="Ghotra's Hospital Management System — managing patients, doctors, appointments and billing.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ═══════════════════ LOGIN ═══════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">🏥</div>
      <div>
        <h1>Ghotra's Hospital</h1>
        <span>Hospital Management System v1.0</span>
      </div>
    </div>
    <h2>Sign In</h2>
    <p>Enter your credentials to access the system</p>

    <div class="demo-creds">
      <strong>Demo Credentials — click to fill</strong>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">
        <button class="btn btn-outline btn-sm demo-btn" data-user="admin"     data-pass="admin123">🛡 Admin</button>
        <button class="btn btn-outline btn-sm demo-btn" data-user="dr.sharma" data-pass="doctor123">🩺 Doctor</button>
        <button class="btn btn-outline btn-sm demo-btn" data-user="reception" data-pass="reception123">📋 Reception</button>
        <button class="btn btn-outline btn-sm demo-btn" data-user="patient1"  data-pass="patient123">👤 Patient</button>
      </div>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="login-username">Username</label>
        <input id="login-username" class="form-control" type="text" placeholder="Enter username" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input id="login-password" class="form-control" type="password" placeholder="Enter password" autocomplete="current-password">
      </div>
      <div id="login-error" style="color:var(--danger);font-size:13px;margin-bottom:10px;min-height:18px"></div>
      <button type="submit" class="btn btn-primary btn-full">🔐 Sign In</button>
    </form>
  </div>
</div>

<!-- ═══════════════════ MAIN APP ═══════════════════ -->
<div id="main-app" style="display:none">

  <!-- Sidebar -->
  <nav id="sidebar"></nav>

  <!-- Topbar -->
  <header id="topbar">
    <button id="menu-toggle" class="btn btn-outline btn-sm" style="display:none" aria-label="Menu">☰</button>
    <span class="topbar-title">🏥 Ghotra's Hospital</span>
    <div class="topbar-actions">
      <span style="font-size:13px;color:var(--muted)">Logged in as:</span>
      <span id="topbar-user" style="font-size:13px;font-weight:600;color:var(--primary)"></span>
    </div>
  </header>

  <!-- Page Content -->
  <main id="content"></main>
</div>

<!-- Toast Container -->
<div id="toast-container"></div>

<!-- Scripts — order matters -->
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/views_admin.js"></script>
<script src="js/views_doctor_recep.js"></script>
<script src="js/views_patient_bridge.js"></script>
<script src="js/app.js"></script>
</body>
</html>
