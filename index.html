<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghotra's Hospital — HMS</title>
  <meta name="description" content="Ghotra's Hospital Management System">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0b0f1a;
      --surface: #111827;
      --surface2: #1a2236;
      --border: #1e2d45;
      --primary: #38bdf8;
      --primary-d: #0284c7;
      --accent: #818cf8;
      --success: #34d399;
      --warning: #fbbf24;
      --danger: #f87171;
      --text: #e2e8f0;
      --muted: #64748b;
      --sidebar-w: 240px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* â”€â”€ Login â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 20% 50%, #0c2a4a 0%, #0b0f1a 60%),
        radial-gradient(ellipse at 80% 20%, #1a103a 0%, transparent 60%);
    }

    .login-card {
      background: rgba(17, 24, 39, 0.85);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .login-logo .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .login-logo h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }

    .login-logo span {
      font-size: 12px;
      color: var(--muted);
      display: block;
    }

    .login-card h2 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .login-card p {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 28px;
    }

    .demo-creds {
      background: rgba(56, 189, 248, 0.07);
      border: 1px solid rgba(56, 189, 248, 0.2);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 24px;
      font-size: 13px;
    }

    .demo-creds strong {
      color: var(--primary);
      display: block;
      margin-bottom: 6px;
    }

    .demo-creds span {
      color: var(--muted);
      line-height: 1.8;
    }

    .demo-creds code {
      color: var(--text);
      background: rgba(255, 255, 255, 0.07);
      padding: 1px 5px;
      border-radius: 4px;
    }

    /* â”€â”€ Forms â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .form-control {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }

    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
    }

    .form-control::placeholder {
      color: var(--muted);
    }

    select.form-control option {
      background: var(--surface);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* â”€â”€ Buttons â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: all .2s;
      text-decoration: none;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-d));
      color: #fff;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(56, 189, 248, 0.35);
    }

    .btn-success {
      background: linear-gradient(135deg, var(--success), #059669);
      color: #fff;
    }

    .btn-success:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(52, 211, 153, 0.35);
    }

    .btn-danger {
      background: linear-gradient(135deg, var(--danger), #dc2626);
      color: #fff;
    }

    .btn-danger:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(248, 113, 113, 0.35);
    }

    .btn-warning {
      background: linear-gradient(135deg, var(--warning), #d97706);
      color: #111;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-outline:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .btn-sm {
      padding: 7px 14px;
      font-size: 12px;
    }

    .btn-full {
      width: 100%;
      justify-content: center;
      padding: 13px;
      font-size: 15px;
    }

    /* â”€â”€ Layout â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    #main-app {
      display: flex;
      min-height: 100vh;
    }

    #sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      overflow-y: auto;
      z-index: 100;
      transition: transform .3s;
    }

    .sidebar-logo {
      padding: 24px 20px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-logo .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .sidebar-logo h2 {
      font-size: 15px;
      font-weight: 700;
    }

    .sidebar-logo span {
      font-size: 10px;
      color: var(--muted);
      display: block;
    }

    .sidebar-section {
      padding: 16px 12px 4px;
    }

    .sidebar-section-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      padding: 0 8px 8px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 9px;
      color: var(--muted);
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .nav-link:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
    }

    .nav-link.active {
      background: rgba(56, 189, 248, 0.12);
      color: var(--primary);
    }

    .nav-link .nav-icon {
      font-size: 16px;
      width: 20px;
      text-align: center;
    }

    .sidebar-bottom {
      margin-top: auto;
      padding: 16px 12px;
      border-top: 1px solid var(--border);
    }

    .user-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px;
      border-radius: 9px;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .user-info .user-name {
      font-size: 13px;
      font-weight: 600;
    }

    .user-info .user-role {
      font-size: 11px;
      color: var(--muted);
      text-transform: capitalize;
    }

    #topbar {
      position: fixed;
      top: 0;
      left: var(--sidebar-w);
      right: 0;
      height: 64px;
      background: rgba(11, 15, 26, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 16px;
      z-index: 50;
    }

    .topbar-title {
      font-size: 18px;
      font-weight: 700;
      flex: 1;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #content {
      margin-left: var(--sidebar-w);
      margin-top: 64px;
      padding: 28px;
      flex: 1;
    }

    /* â”€â”€ Cards â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 700;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: transform .2s;
    }

    .stat-card:hover {
      transform: translateY(-2px);
    }

    .stat-icon {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .stat-icon.blue {
      background: rgba(56, 189, 248, 0.15);
    }

    .stat-icon.purple {
      background: rgba(129, 140, 248, 0.15);
    }

    .stat-icon.green {
      background: rgba(52, 211, 153, 0.15);
    }

    .stat-icon.yellow {
      background: rgba(251, 191, 36, 0.15);
    }

    .stat-icon.red {
      background: rgba(248, 113, 113, 0.15);
    }

    .stat-val {
      font-size: 28px;
      font-weight: 800;
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* â”€â”€ Tables â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
    }

    th {
      padding: 10px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    td {
      padding: 12px 14px;
      border-bottom: 1px solid rgba(30, 45, 69, 0.6);
      vertical-align: middle;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }

    .search-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .search-input-wrap {
      position: relative;
      flex: 1;
      max-width: 340px;
    }

    .search-input-wrap input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 9px 14px 9px 36px;
      color: var(--text);
      font-size: 13.5px;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
    }

    .search-input-wrap input:focus {
      border-color: var(--primary);
    }

    .search-input-wrap .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 14px;
    }

    /* â”€â”€ Badges â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-blue {
      background: rgba(56, 189, 248, 0.15);
      color: var(--primary);
    }

    .badge-green {
      background: rgba(52, 211, 153, 0.15);
      color: var(--success);
    }

    .badge-yellow {
      background: rgba(251, 191, 36, 0.15);
      color: var(--warning);
    }

    .badge-red {
      background: rgba(248, 113, 113, 0.15);
      color: var(--danger);
    }

    .badge-purple {
      background: rgba(129, 140, 248, 0.15);
      color: var(--accent);
    }

    .badge-gray {
      background: rgba(100, 116, 139, 0.15);
      color: var(--muted);
    }

    /* â”€â”€ Modals â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }

    .modal-overlay.active {
      display: flex;
      animation: fadeIn .2s ease;
    }

    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp .25s ease;
    }

    .modal-box.wide {
      max-width: 720px;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .modal-header h3 {
      font-size: 18px;
      font-weight: 700;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: color .2s;
    }

    .modal-close:hover {
      color: var(--text);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 24px;
    }

    .confirm-box {
      max-width: 380px;
      text-align: center;
    }

    .confirm-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .confirm-box h3 {
      margin-bottom: 8px;
    }

    .confirm-box p {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 4px;
    }

    /* â”€â”€ Toasts â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13.5px;
      font-weight: 500;
      min-width: 240px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      transform: translateX(120%);
      transition: transform .3s ease;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(0);
    }

    .toast-success {
      border-left: 3px solid var(--success);
    }

    .toast-error {
      border-left: 3px solid var(--danger);
    }

    .toast-info {
      border-left: 3px solid var(--primary);
    }

    .toast-icon {
      font-size: 16px;
    }

    /* â”€â”€ Detail View â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .detail-item label {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      display: block;
      margin-bottom: 4px;
    }

    .detail-item span {
      font-size: 14px;
      color: var(--text);
    }

    .detail-divider {
      grid-column: 1/-1;
      border: none;
      border-top: 1px solid var(--border);
      margin: 4px 0;
    }

    .record-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 12px;
    }

    .record-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    /* â”€â”€ Page Titles â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .page-header {
      margin-bottom: 24px;
    }

    .page-header h1 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .page-header p {
      color: var(--muted);
      font-size: 14px;
    }

    /* â”€â”€ Empty State â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
    }

    .empty-state .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .empty-state h3 {
      font-weight: 600;
      margin-bottom: 6px;
    }

    .empty-state p {
      color: var(--muted);
      font-size: 14px;
    }

    /* â”€â”€ Section tabs â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--surface2);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 20px;
      width: fit-content;

    function qs(sel, ctx = document) { return ctx.querySelector(sel); }
    function qsa(sel, ctx = document) { return [...ctx.querySelectorAll(sel)]; }

    function toast(msg, type = 'success') {
      const icons = { success: 'âœ“', error: 'âœ•', info: 'â„¹' };
      const t = document.createElement('div');
      t.className = `toast toast-${type}`;
      t.innerHTML = `<span class="toast-icon">${icons[type] || 'â„¹'}</span><span>${msg}</span>`;
      qs('#toast-container').appendChild(t);
      setTimeout(() => t.classList.add('show'), 10);
      setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 350); }, 3200);
    }

    function confirmDialog(msg) {
      return new Promise(resolve => {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay active';
        overlay.innerHTML = `
      <div class="modal-box confirm-box">
        <div class="confirm-icon">âš ï¸</div>
        <h3>Confirm Action</h3>
        <p>${msg}</p>
        <div class="modal-actions">
          <button class="btn btn-outline" id="conf-no">Cancel</button>
          <button class="btn btn-danger"  id="conf-yes">Confirm</button>
        </div>
      </div>`;
        document.body.appendChild(overlay);
        qs('#conf-no', overlay).onclick = () => { overlay.remove(); resolve(false); };
        qs('#conf-yes', overlay).onclick = () => { overlay.remove(); resolve(true); };
      });
    }

    function formatDate(d) {
      if (!d) return 'â€”';
      return new Date(d + 'T00:00:00').toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function getAge(dob) {
      if (!dob) return 'â€”';
      const ms = Date.now() - new Date(dob).getTime();
      return Math.floor(ms / (365.25 * 24 * 3600 * 1000)) + ' yrs';
    }

    function statusBadge(status) {
      const map = {
        Scheduled: 'badge-blue', Completed: 'badge-green', Cancelled: 'badge-red',
        Paid: 'badge-green', Pending: 'badge-yellow', Active: 'badge-green', Inactive: 'badge-gray'
      };
      return `<span class="badge ${map[status] || 'badge-gray'}">${status}</span>`;

          { icon: 'ðŸ ', label: 'Dashboard', page: 'doctor-dashboard' },
          { icon: 'ðŸ‘¥', label: 'My Patients', page: 'doctor-patients' },
        ],
        receptionist: [
          { icon: 'ðŸ ', label: 'Dashboard', page: 'recep-dashboard' },
          { icon: 'âž•', label: 'Register Patient', page: 'recep-register' },
          { icon: 'ðŸ“…', label: 'Appointments', page: 'recep-appointments' },
        ],
        patient: [
          { icon: 'ðŸ ', label: 'Dashboard', page: 'patient-dashboard' },
          { icon: 'ðŸ“‹', label: 'My Records', page: 'patient-records' },
          { icon: 'ðŸ’³', label: 'My Bills', page: 'patient-bills' },
        ],
      };

      const links = (navs[session.role] || []).map(n => `
    <button class="nav-link" data-page="${n.page}">
      <span class="nav-icon">${n.icon}</span>${n.label}
    </button>`).join('');

      const initials = session.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);

      qs('#sidebar').innerHTML = `
    <div class="sidebar-logo">
      <div class="logo-icon">ðŸ¥</div>
      <div><h2>Ghotra's Hospital</h2><span>Management System</span></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Navigation</div>
      ${links}
    </div>
    <div class="sidebar-bottom">
      <div class="user-card">
        <div class="user-avatar">${initials}</div>
        <div class="user-info">
          <div class="user-name">${session.name}</div>
          <div class="user-role">${session.role}</div>
        </div>
      </div>
      <button class="btn btn-outline btn-sm" id="logout-btn" style="width:100%;margin-top:10px;justify-content:center;">
        ðŸšª Logout
      </button>
    </div>`;

      // Attach nav events
      qsa('.nav-link').forEach(btn => {
        btn.addEventListener('click', () => Router.navigate(btn.dataset.page));
      });

      qs('#logout-btn').addEventListener('click', () => {
        Auth.logout();
        showLogin();
      });
    }

    /* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
       LOGIN
    â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
    function showLogin() {
      qs('#login-screen').style.display = 'flex';
      qs('#main-app').style.display = 'none';
      qs('#login-error').textContent = '';
      qs('#login-username').value = '';
      qs('#login-password').value = '';
    }

    function showApp(session) {
      qs('#login-screen').style.display = 'none';
      qs('#main-app').style.display = 'flex';
      buildSidebar(session);
      qs('#topbar-user').textContent = session.name;

      const defaults = {
        admin: 'admin-dashboard',
        doctor: 'doctor-dashboard',
        receptionist: 'recep-dashboard',
        patient: 'patient-dashboard',
      };
      Router.navigate(defaults[session.role] || 'admin-dashboard');
    }

    /* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
       INIT
    â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
    document.addEventListener('DOMContentLoaded', () => {
      DB.init();

      // Login form
      qs('#login-form').addEventListener('submit', e => {
        e.preventDefault();
        const username = qs('#login-username').value.trim();
        const password = qs('#login-password').value.trim();
        const result = Auth.login(username, password);
        if (result.success) {
          showApp(result.session);
        } else {
          qs('#login-error').textContent = 'âš  Invalid username or password.';
        }
      });

      // Demo credential buttons
      qsa('.demo-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          qs('#login-username').value = btn.dataset.user;
          qs('#login-password').value = btn.dataset.pass;
        });
      });

      // Mobile sidebar toggle
      const menuBtn = qs('#menu-toggle');
      if (menuBtn) {
        menuBtn.addEventListener('click', () => qs('#sidebar').classList.toggle('open'));
      }

      // Resume session if exists
      const session = Auth.getSession();
      if (session) showApp(session);
      else showLogin();
    });

  </script>
</body>
